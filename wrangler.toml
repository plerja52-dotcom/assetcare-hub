name = "reliability-dashboard"
main = "src/server.ts"
compatibility_date = "2024-10-15"
compatibility_flags = ["nodejs_compat"]

# Static assets are served from the Vite build output.
[assets]
directory = "./dist/client"

# D1 database binding — created with `wrangler d1 create reliability-dashboard`.
# Paste the resulting database_id below.
[[d1_databases]]
binding = "DB"
database_name = "reliability-dashboard"
database_id = "REPLACE_ME_WITH_YOUR_D1_ID"
migrations_dir = "migrations"

# Runtime env vars can be set here (non-secret) or via `wrangler secret put NAME`.
# [vars]
# SESSION_TTL_DAYS = "7"
